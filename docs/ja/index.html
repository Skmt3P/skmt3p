<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.D.Sakamoto - Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: 'DotGothic16', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            color: #d6f9dd;
            background:
                linear-gradient(180deg, rgba(14, 24, 18, 0.92), rgba(2, 8, 5, 0.98)),
                repeating-linear-gradient(
                    0deg,
                    rgba(118, 255, 157, 0.04) 0,
                    rgba(118, 255, 157, 0.04) 1px,
                    transparent 1px,
                    transparent 4px
                ),
                #020805;
        }

        .container {
            position: relative;
            box-sizing: border-box;
            min-width: 200px;
            max-width: 1040px;
            margin: 32px auto;
            padding: 76px 42px 42px;
            background: rgba(4, 15, 8, 0.92);
            border: 1px solid #2fa866;
            border-radius: 8px;
            box-shadow:
                0 0 0 1px rgba(118, 255, 157, 0.08),
                0 18px 60px rgba(0, 0, 0, 0.48),
                inset 0 0 32px rgba(47, 168, 102, 0.08);
        }

        .container::before {
            content: "skmt3p@portfolio:~";
            position: absolute;
            top: 0;
            right: 0;
            left: 0;
            height: 40px;
            box-sizing: border-box;
            padding: 10px 18px 10px 82px;
            overflow: hidden;
            color: #83f6a4;
            background: #07130b;
            border-bottom: 1px solid #2fa866;
            border-radius: 8px 8px 0 0;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        .container::after {
            content: "";
            position: absolute;
            top: 15px;
            left: 18px;
            width: 10px;
            height: 10px;
            background: #ff5f56;
            border-radius: 50%;
            box-shadow:
                18px 0 0 #ffbd2e,
                36px 0 0 #27c93f;
        }

        @media (max-width: 767px) {
            .container {
                margin: 12px;
                padding: 64px 18px 24px;
            }
        }

        .markdown-body {
            background-color: transparent;
            color: #d6f9dd;
            font-family: inherit;
            font-size: 15px;
            line-height: 1.8;
        }

        .markdown-body * {
            box-sizing: border-box;
        }

        .markdown-body h1,
        .markdown-body h2,
        .markdown-body h3,
        .markdown-body h4,
        .markdown-body strong {
            color: #f2fff4;
        }

        .markdown-body a {
            color: #7ee7ff;
            text-decoration: none;
        }

        .markdown-body a:hover {
            color: #b9f7ff;
            text-decoration: none;
            text-shadow: 0 0 8px rgba(126, 231, 255, 0.5);
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #83f6a4;
            font-size: 16px;
        }

        .error {
            text-align: center;
            padding: 50px;
            color: #ffb8b2;
            font-size: 16px;
            border: 1px solid #ff7b72;
            border-radius: 6px;
            background-color: #310707;
            margin: 20px;
        }

        html {
            scroll-behavior: smooth;
        }

        .markdown-body p[align="center"] a {
            display: inline-block;
            margin: 6px 8px;
            padding: 7px 14px;
            text-decoration: none;
            color: #9effb5;
            border: 1px solid rgba(131, 246, 164, 0.78);
            border-radius: 4px;
            transition: all 0.2s ease;
            font-weight: 500;
            background: rgba(24, 69, 37, 0.42);
        }

        .markdown-body p[align="center"] a:hover {
            background-color: #83f6a4;
            color: #031107;
            transform: translateY(-1px);
            box-shadow: 0 0 18px rgba(131, 246, 164, 0.32);
        }

        .markdown-body img {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
        }

        .markdown-body p[align="center"],
        .markdown-body h1[align="center"] {
            text-align: center;
        }

        .markdown-body p[align="right"] {
            text-align: right;
        }

        .markdown-body h2 {
            margin-top: 40px;
            margin-bottom: 16px;
            border-bottom: 1px solid rgba(131, 246, 164, 0.32);
            padding-bottom: 8px;
        }

        .markdown-body h2::before {
            content: "$ ";
            color: #83f6a4;
        }

        .markdown-body h3::before,
        .markdown-body h4::before {
            content: "> ";
            color: #83f6a4;
        }

        .markdown-body ul {
            padding-left: 1.4em;
        }

        .markdown-body li::marker {
            color: #83f6a4;
        }

        .markdown-body hr {
            margin: 24px 0;
            border: 0;
            border-top: 1px dashed rgba(131, 246, 164, 0.34);
        }

        .markdown-body {
            opacity: 0;
            animation: fadeIn 0.5s ease-in-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media print {
            .container {
                max-width: none;
                margin: 0;
                padding: 20px;
            }
            
            .markdown-body p[align="center"] a {
                color: #000 !important;
                border: 1px solid #000 !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loading" class="loading">
            📄 Loading README.md...
        </div>
        <div id="error" class="error" style="display: none;">
            ❌ Failed to load README.md. Please make sure the file exists in the same directory.
        </div>
        <div id="content" class="markdown-body" style="display: none;"></div>
    </div>

    <script>
        marked.setOptions({
            breaks: true,
            gfm: true,
            headerIds: true,
            sanitize: false,
            silent: false
        });

        async function loadMarkdown() {
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error');
            const contentEl = document.getElementById('content');

            try {
                const domain = window.location.hostname;
                let readMeUrl = './README.md';
                if (domain.includes('skmt3p.com')) {
                    readMeUrl = 'https://skmt3p.com/ja/README.md';
                }
                if (domain.includes('skmt3p.github.io')) {
                    readMeUrl = 'https://skmt3p.github.io/skmt3p/ja/README.md';
                }
                const response = await fetch(readMeUrl);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const markdownText = await response.text();
                const cleanedMarkdown = markdownText.replace(/^---[\s\S]*?---\n?/m, '');
                let htmlContent = marked.parse(cleanedMarkdown);
                htmlContent = htmlContent.replace(/src="\.\/static\//g, 'src="../static/');
                
                loadingEl.style.display = 'none';
                contentEl.innerHTML = htmlContent;
                contentEl.style.display = 'block';

                enhanceContent();
                
                const h1 = contentEl.querySelector('h1');
                if (h1) {
                    document.title = h1.textContent + ' - Portfolio';
                }

            } catch (error) {
                loadingEl.style.display = 'none';
                errorEl.style.display = 'block';
                errorEl.innerHTML = `
                    <h3>Failed to load README.md</h3>
                    <p><strong>Error:</strong> ${error.message}</p>
                    <p>Please ensure:</p>
                    <ul style="text-align: left; display: inline-block;">
                        <li>README.md exists in the same directory as this HTML file</li>
                        <li>You're serving this page via a web server (not file:// protocol)</li>
                        <li>The web server allows access to .md files</li>
                    </ul>
                `;
            }
        }

        function enhanceContent() {
            const contentEl = document.getElementById('content');

            const images = contentEl.querySelectorAll('img');
            images.forEach(img => {
                if (img.src.includes('./static/')) {
                    img.src = img.src.replace('./static/', '../static/');
                }
                if (!img.alt && img.src.includes('heading')) {
                    img.alt = 'Heading Image';
                } else if (!img.alt && img.src.includes('logo')) {
                    img.alt = 'Logo';
                }
            });

            const links = contentEl.querySelectorAll('a[href^="http"]');
            links.forEach(link => {
                if (!link.getAttribute('target')) {
                    link.setAttribute('target', '_blank');
                    link.setAttribute('rel', 'noopener noreferrer');
                }
            });

            const anchorLinks = contentEl.querySelectorAll('a[href^="#"]');
            anchorLinks.forEach(link => {
                link.addEventListener('click', (e) => {
                    const targetId = link.getAttribute('href').substring(1);
                    const targetElement = document.getElementById(targetId);
                    if (targetElement) {
                        e.preventDefault();
                        targetElement.scrollIntoView({ behavior: 'smooth' });
                        history.pushState(null, null, '#' + targetId);
                    }
                });
            });
        }

        function handleHashNavigation() {
            if (window.location.hash) {
                setTimeout(() => {
                    const targetElement = document.querySelector(window.location.hash);
                    if (targetElement) {
                        targetElement.scrollIntoView({ behavior: 'smooth' });
                    }
                }, 100);
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await loadMarkdown();
            handleHashNavigation();
        });

        window.addEventListener('popstate', handleHashNavigation);
    </script>
</body>
</html>
